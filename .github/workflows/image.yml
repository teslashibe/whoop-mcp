name: build-image

# Builds and pushes the smore fork image to GHCR. One image serves two
# entrypoints: the default MCP data server (CMD node dist/server.js) and the
# stateless auth-server (override command: node dist/auth-server.js). See
# teslashibe/smore#146.

on:
  push:
    branches: [main, smore]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/teslashibe/whoop-mcp
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
